<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Campus Calm </title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playpen+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
  
  
  <style>
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:#0f1220;
      color:#f4f4ff;
    }
    .wrap{
      max-width:900px;
      margin:0 auto;
      padding:40px 18px;
    }
    h1{
      margin:0 0 10px;
      font-size: clamp(28px, 3vw, 42px);
    }
    p{
      margin:0 0 22px;
      color:rgba(244,244,255,.75);
      font-size: 16px;
    }
    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap:14px;
      margin-top: 18px;
    }
    .mood{
      padding: 0;
      background: transparent;
      border: none;
    }
    .blobimg{
      width:170px;
      max-width:85%;
      max-height: 85%;
      object-fit: contain;
      display:block;
    }
    .label{
      font-family: "Playpen Sans Thai", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      font-weight: 700;
      margin: 14px 0 0;
      font-size: 28px;
      letter-spacing: 0.2px;
      color: #121225;
    }
    .note{
      margin-top:26px;
      font-size: 13px;
      color: rgba(244,244,255,.6);
    }

    .cardOuter{
      background: #EADBFF;              /* purple outer */
      border-radius: 28px;
      padding: 18px 18px 22px;
      box-shadow: 0 14px 40px rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.08);
    }

    .cardInner{
      background: #FFFCEE;              /* pale yellow inner */
      border-radius: 22px;
      padding: 18px;
      height: 210px;

      display: flex;
      align-items: center;
      justify-content: center;
    }

  </style>
</head>
<body>
  <main class="wrap">
    <h1>Welcome — how are you doing today?</h1>
    <p>Pick whatever feels closest. </p>

<section class="grid" aria-label="Mood options">
  <div class="mood">
    <div class="cardOuter">
      <div class="cardInner">
        <img class="blobimg" src="assets/blobs/feeling-good.svg" alt="Feeling good blob">
      </div>
      <p class="label">Feeling Good</p>
    </div>
  </div>

  <div class="mood">
    <div class="cardOuter">
      <div class="cardInner">
        <img class="blobimg" src="assets/blobs/rough-day.svg" alt="Rough day blob">
      </div>
      <p class="label">Rough Day</p>
    </div>
  </div>

  <div class="mood">
    <div class="cardOuter">
      <div class="cardInner">
        <img class="blobimg" src="assets/blobs/overwhelmed.svg" alt="Overwhelmed blob">
      </div>
      <p class="label">Overwhelmed</p>
    </div>
  </div>

  <div class="mood">
    <div class="cardOuter">
      <div class="cardInner">
        <img class="blobimg" src="assets/blobs/not-sure.svg" alt="Not sure blob">
      </div>
      <p class="label">Not Sure</p>
    </div>
  </div>
</section>

  </main>
</body>
</html>
