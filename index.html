<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Campus Calm </title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playpen+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
  
  
  <style>
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:#0f1220;
      color:#f4f4ff;
    }
    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:40px 18px;
      width: 100%;
    }
    h1{
      margin:0 0 10px;
      font-size: clamp(28px, 3vw, 42px);
    }
    p{
      margin:0 0 22px;
      color:rgba(244,244,255,.75);
      font-size: 16px;
    }
    .grid{
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr)); /* forces 4 columns */
      gap: 12px;
      margin-top: 18px;
      align-items: start;
    }

    .mood{
      padding: 0;
      background: transparent;
      border: none;

      width: 100%;          /* fill grid column */
      height: auto;         /* let cardOuter define height */
      display: block;       /* no need for flex here */
      min-width: 0;
    }

    .blobimg{
      width: min(180px, 75%);
      height: auto;
      object-fit: contain;
    }

    .label{
      font-family: "Playpen Sans Thai", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      font-weight: 400;
      margin: 14px 0 0;
      font-size: 30px;
      letter-spacing: 0.2px;
      color: #121225;
      text-align: center;
      line-height: 1.15;
      min-height: 64px;           /* reserves space so “Feeling Good” doesn’t change height */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .welcomemessage{
      font-family: "Quicksand", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      font-weight: 800;
      letter-spacing: 0.5px;
      color: #EDEBFF;

    }

    .welcomesentence{
      font-family: "Quicksand", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: #EDEBFF;
      font-size: 20px;
    }

    .note{
      margin-top:26px;
      font-size: 13px;
      color: rgba(244,244,255,.6);
    }

    .cardOuter{
      width: 100%;
      height: 420px;        /* keep consistent height */
      box-sizing: border-box;

      background: #EADBFF;
      border-radius: 28px;
      padding: 18px 18px 22px;
      box-shadow: 0 14px 40px rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.08);

      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      text-align: center;
    }

    .cardInner{
      background: #FFFCEE;              /* pale yellow inner */
      border-radius: 22px;
      padding: 18px;
      height: 260px;
      width: 100%;
      box-sizing: border-box;

      display: flex;
      align-items: center;
      justify-content: center;
    }

  </style>
</head>
<body>
  <main class="wrap">
  <h1 class="welcomemessage"> Welcome, how are you doing today? </h1>
    <p class = "welcomesentence"> Pick whatever feels closest. </p>

<section class="grid" aria-label="Mood options">
  <div class="mood">
    <div class="cardOuter">
      <div class="cardInner">
        <img class="blobimg" src="assets/mood-blobs/feeling-good.svg" alt="Feeling good blob">
      </div>
      <p class="label">Feeling Good</p>
    </div>
  </div>

  <div class="mood">
    <div class="cardOuter">
      <div class="cardInner">
        <img class="blobimg" src="assets/mood-blobs/sad.svg" alt="Rough day blob">
      </div>
      <p class="label">Rough Day</p>
    </div>
  </div>

  <div class="mood">
    <div class="cardOuter">
      <div class="cardInner">
        <img class="blobimg" src="assets/mood-blobs/overwhelmed.svg" alt="Overwhelmed blob">
      </div>
      <p class="label">Overwhelmed</p>
    </div>
  </div>

  <div class="mood">
    <div class="cardOuter">
      <div class="cardInner">
        <img class="blobimg" src="assets/mood-blobs/neutral.svg" alt="Not sure blob">
      </div>
      <p class="label">Not Sure</p>
    </div>
  </div>
</section>

  </main>
</body>
</html>
