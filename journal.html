<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Campus Calm – Journal</title>

  <!-- Google Font for soft, rounded feel -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-purple: #5e4b7a;
      --card-purple: #efe6ff;
      --text-dark: #3b2f4a;
      --text-light: #ffffff;
      --accent-pink: #f3b6c8;
      --button-purple: #7a63a6;
    }

    * {
      box-sizing: border-box;
      font-family: 'Nunito', sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg-purple);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: var(--card-purple);
      width: 90%;
      max-width: 420px;
      padding: 2.5rem 2rem;
      border-radius: 28px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
    }

    .logo {
      width: 90px;
      margin-bottom: 1rem;
    }

    h1 {
      margin: 0.5rem 0;
      color: var(--text-dark);
      font-weight: 700;
    }

    .subtitle {
      color: #6b5a82;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }

    textarea {
      width: 100%;
      height: 150px;
      padding: 1rem;
      border-radius: 16px;
      border: none;
      resize: none;
      font-size: 0.95rem;
      background: #ffffff;
      color: var(--text-dark);
      box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.05);
    }

    textarea::placeholder {
      color: #9a8fb0;
    }

    textarea:focus {
      outline: none;
      box-shadow: 0 0 0 2px rgba(122, 99, 166, 0.3);
    }

    button {
      margin-top: 1.2rem;
      padding: 0.7rem 2rem;
      border-radius: 999px;
      border: none;
      background: var(--button-purple);
      color: var(--text-light);
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 22px rgba(0, 0, 0, 0.2);
    }

    #affirmation {
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: #6b5a82;
      display: none;
    }
  </style>
</head>

<body>

  <div class="container">
    <!-- Replace src with your actual logo file -->
    <img src="logo.png" alt="Campus Calm logo" class="logo">

    <h1>Write & Release</h1>
    <p class="subtitle">Let it out. Then let it go.</p>

    <textarea id="journalInput" placeholder="Type what you want to release..."></textarea>

    <button id="releaseBtn">Release</button>

    <p id="affirmation">🌙 Your thoughts are released. You are safe.</p>
  </div>

  <script src="journal.js"></script>
</body>
</html>
