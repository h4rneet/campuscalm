<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Campus Calm — Choose a Mode</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Patrick+Hand&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="modes.css">
</head>

<body>
  <main class="wrap">

    <!-- corner blob -->
    <img class="floatingBlob" src="assets/mainblob.svg" alt="Campus Calm blob">

    <!-- mood message -->
    <h1 id="moodTitle" class="moodTitle">Hi</h1>
    <p id="moodSub" class="moodSub">Pick a mode.</p>

    <!-- mode buttons (stacked) -->
    <section class="modeStack" aria-label="Mode options">

      <a id="momentCard" class="modeCard" href="moment.html">
        <div class="modeName">Have a Moment</div>
        <div class="modeDesc">Guided breathing + calming visuals</div>
      </a>

      <a id="journalCard" class="modeCard" href="journal.html">
        <div class="modeName">Write</div>
        <div class="modeDesc">Vent it out: no saving, no pressure</div>
      </a>

      <a id="tuneCard" class="modeCard" href="tuneout.html">
        <div class="modeName">Tune Out</div>
        <div class="modeDesc">Ambient audio for focus or rest</div>
      </a>

    </section>

  </main>

  <!-- Back button bottom-right -->
  <a class="backFloating" href="index.html">← Back</a>

  <script src="modes.js"></script>
</body>
</html>
