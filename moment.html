<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Have a Moment — Campus Calm</title>
  <link rel="stylesheet" href="moment.css">
</head>
<body>

 
<img class="momentLogo" src="assets/logo.svg" alt="Campus Calm logo">
  <main class="container" role="main">
    <div class="glass"></div>
    <header>
      <h1>Have a Moment</h1>
      <p class="subtitle">Follow a gentle breathing rhythm.</p>
    </header>

    <section class="stage" role="group" aria-label="Breathing animation">
      <div class="ring" aria-hidden="true">
        <div class="ring__progress" id="ringProgress"></div>
        <div class="orb" id="orb" aria-hidden="true"></div>
      </div>

      <p id="cue" class="cue" aria-live="polite" aria-atomic="true">Ready?</p>
      <p id="subcue" class="subcue" aria-live="polite" aria-atomic="true"></p>
    </section>

    <section class="controls" aria-label="Controls">
      <button id="startBtn" class="btn" data-state="idle" aria-pressed="false">Start</button>
      <button id="stopBtn" class="btn btn--ghost" disabled>Stop</button>

      <div class="control-inline">
        <label for="patternSel" class="label">Pace</label>
        <select id="patternSel" class="select" aria-label="Breathing pace">
          <option value="4-4-6">Gentle (4–4–6)</option>
          <option value="4-7-8">Calm (4–7–8)</option>
          <option value="5-5-5">Even (5–5–5)</option>
        </select>
      </div>
    </section>

    <footer>
      <blockquote class="quote" id="quote" aria-live="polite">
        “A short pause can soften a long day.”
      </blockquote>
      <p class="back"><a class="backlink" href="index.html">← Back</a></p>
    </footer>
    </div>
  </main>

  <script src="moment.js"></script>
  
</body>
</html>
